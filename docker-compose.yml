services:
  qdrant:
    image: qdrant/qdrant:latest
    network_mode: host
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    network_mode: host
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    image: redis/redis-stack:latest
    network_mode: host
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  biblion:
    build: .
    image: biblion:latest
    network_mode: host
    restart: unless-stopped
    ports:
      - "18765:18765"
    environment:
      PORT: "18765"
      HOST: "0.0.0.0"
      REDIS_URL: "redis://localhost:6379"
      EMBEDDING_URL: "${EMBEDDING_URL:-http://localhost:11434}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text:v1.5}"
      DEDUP_THRESHOLD: "${DEDUP_THRESHOLD:-0.95}"
      SEARCH_MIN_SCORE: "${SEARCH_MIN_SCORE:-0.45}"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; r = urllib.request.urlopen('http://localhost:18765/biblion/status'); import json; d = json.loads(r.read()); exit(0 if d.get('type') == 'ready' else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  webui:
    build: ./webui
    image: biblion-webui:latest
    network_mode: host
    restart: unless-stopped
    ports:
      - "18766:18766"
    environment:
      BIBLION_API_URL: "http://localhost:18765"
      PORT: "18766"
    depends_on:
      biblion:
        condition: service_healthy

volumes:
  qdrant_data:
  ollama_data:
  redis_data:
