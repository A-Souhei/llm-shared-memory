services:
  qdrant:
    image: qdrant/qdrant:latest
    profiles: [qdrant]
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    profiles: [ollama]
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # GPU support — uncomment if you have an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  redis:
    image: redis/redis-stack:latest
    profiles: [redis]
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  biblion:
    build: .
    image: biblion:latest
    restart: unless-stopped
    ports:
      - "18765:18765"
    environment:
      PORT: "18765"
      HOST: "0.0.0.0"
      REDIS_URL: "redis://host.docker.internal:23790"
      EMBEDDING_URL: "${EMBEDDING_URL:-http://host.docker.internal:11434}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text:v1.5}"
      DEDUP_THRESHOLD: "${DEDUP_THRESHOLD:-0.95}"
      SEARCH_MIN_SCORE: "${SEARCH_MIN_SCORE:-0.45}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  webui:
    build: ./webui
    image: biblion-webui:latest
    profiles: [webui]
    restart: unless-stopped
    ports:
      - "18766:18766"
    environment:
      BIBLION_API_URL: "http://biblion:18765"
      PORT: "18766"
    depends_on:
      - biblion

volumes:
  qdrant_data:
  ollama_data:
  redis_data:
