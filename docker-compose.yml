services:
  qdrant:
    image: qdrant/qdrant:latest
    network_mode: host
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    network_mode: host
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    image: redis/redis-stack:latest
    network_mode: host
    ports:
      - "23790:23790"
      - "8001:8001"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    environment:
      REDIS_ARGS: "--port 23790"

  biblion:
    build: .
    image: biblion:latest
    network_mode: host
    restart: unless-stopped
    ports:
      - "18765:18765"
    environment:
      PORT: "18765"
      HOST: "0.0.0.0"
      REDIS_URL: "redis://localhost:23790"
      EMBEDDING_URL: "${EMBEDDING_URL:-http://localhost:11434}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text:v1.5}"
      DEDUP_THRESHOLD: "${DEDUP_THRESHOLD:-0.95}"
      SEARCH_MIN_SCORE: "${SEARCH_MIN_SCORE:-0.45}"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; r = urllib.request.urlopen('http://localhost:18765/biblion/status'); import json; d = json.loads(r.read()); exit(0 if d.get('type') == 'ready' else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ts-biblion:
    image: tailscale/tailscale:latest
    hostname: biblion
    restart: unless-stopped
    environment:
      TS_AUTHKEY: "${TS_AUTHKEY}"
      TS_EXTRA_ARGS: ""
      TS_SERVE_CONFIG: /config/biblion.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ts_biblion_state:/var/lib/tailscale
      - ./tailscale/config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      biblion:
        condition: service_healthy

  webui:
    build: ./webui
    image: biblion-webui:latest
    network_mode: host
    restart: unless-stopped
    ports:
      - "18766:18766"
    environment:
      BIBLION_API_URL: "http://localhost:18765"
      PORT: "18766"
    depends_on:
      biblion:
        condition: service_healthy

  ts-webui:
    image: tailscale/tailscale:latest
    hostname: biblion-webui
    restart: unless-stopped
    environment:
      TS_AUTHKEY: "${TS_AUTHKEY}"
      TS_EXTRA_ARGS: ""
      TS_SERVE_CONFIG: /config/webui.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - ts_webui_state:/var/lib/tailscale
      - ./tailscale/config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      biblion:
        condition: service_healthy

volumes:
  qdrant_data:
  ollama_data:
  redis_data:
  ts_biblion_state:
  ts_webui_state:
